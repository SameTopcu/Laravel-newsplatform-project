version: '3.8'

services:
    # Web Sunucusu
    nginx:
        image: nginx:latest
        container_name: project_nginx
        ports:
            - "8080:80"  
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - php
        networks:
            - app-network

    # Veritabanı
    mysql:
        image: mysql:8.0
        container_name: project_mysql
        ports:
            - "33062:3306"  
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: project_db
        volumes:
            - project_dbdata:/var/lib/mysql
        networks:
            - app-network

    # PHP İşleyici
    php:
        build:
            context: .
            dockerfile: ./Dockerfile
        container_name: project_php
        volumes:
            - ./:/var/www
        ports:
            - "9000:9000" 
        networks:
            - app-network

networks:
  app-network:
    driver: bridge

volumes:
  project_dbdata:
    driver: local

